deploymentMode: self-hosted

image:
  repository: ghcr.io/berry/berry-chat
  tag: "0.1.0"
  pullPolicy: IfNotPresent

web:
  replicas: 2
  port: 3108
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70

api:
  replicas: 2
  port: 3000
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

worker:
  replicas: 1
  concurrency: 4
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 6
    targetCPUUtilizationPercentage: 75

external:
  postgres:
    url: ""
    existingSecret: berry-postgres
    secretKey: BERRY_DATABASE_URL
  redis:
    url: ""
    existingSecret: berry-redis
    secretKey: BERRY_REDIS_URL
  s3:
    endpoint: ""
    publicEndpoint: ""
    artifactBucket: berry-artifacts
    auditBucket: berry-audit
    region: us-east-1
    existingSecret: berry-s3
    accessKeyIdKey: BERRY_ARTIFACT_S3_ACCESS_KEY_ID
    secretAccessKeyKey: BERRY_ARTIFACT_S3_SECRET_ACCESS_KEY

files:
  maxUploadBytes: "1073741824"
  multipartPartSize: "16777216"
  presignSeconds: "900"

auth:
  mode: better-auth
  baseUrl: ""
  trustedOrigins: ""
  signupEnabled: "false"
  setupOwnerEmail: ""
  existingSecret: berry-auth
  betterAuthSecretKey: BETTER_AUTH_SECRET
  setupTokenKey: BERRY_SETUP_TOKEN
  scimBearerTokenKey: BERRY_SCIM_BEARER_TOKEN

policy:
  existingSecret: berry-policy-signing
  keyIdKey: BERRY_POLICY_SIGNING_KEY_ID
  privateKeyPemKey: BERRY_POLICY_SIGNING_PRIVATE_KEY_PEM

usage:
  existingSecret: berry-usage-signing
  signingSecretsKey: BERRY_USAGE_SIGNING_SECRETS

billing:
  provider: none
  stripeApiBaseUrl: https://api.stripe.com
  existingSecret: berry-billing
  stripeSecretKeyKey: STRIPE_SECRET_KEY
  stripeMeterEventNameKey: STRIPE_BILLING_METER_EVENT_NAME
  stripeCreditPriceIdKey: STRIPE_CREDIT_PRICE_ID

router:
  inferenceBaseUrl: ""
  completionTransport: stream
  existingSecret: berry-router
  apiKeyKey: BERRY_ROUTER_API_KEY

sandbox:
  provider: e2b
  templateId: base
  ttlSeconds: 900
  keepMemoryOnPause: false
  cpuCount: 2
  memoryMiB: 4096
  diskMiB: 10240
  estimatedHourlyCostMicros: 0
  minimumExecCostMicros: 0
  existingSecret: berry-e2b
  apiKeyKey: E2B_API_KEY

ingress:
  enabled: false
  className: ""
  webHost: berry.example.com
  apiHost: api.berry.example.com
  tlsSecretName: ""
