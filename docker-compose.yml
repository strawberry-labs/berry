version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: berrydotme-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: berrydotme
      POSTGRES_USER: berrydotme_user
      POSTGRES_PASSWORD: berrydotme_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U berrydotme_user -d berrydotme"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: berrydotme-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local 